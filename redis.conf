# Disable non-TLS
port 0
tls-port 6379

tls-cert-file /certs/redis.crt
tls-key-file /certs/redis.key
tls-ca-cert-file /certs/ca.crt

tls-auth-clients no

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
appendonly yes

# Networking
protected-mode no
bind 0.0.0.0
